<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ q }} - AEGIS Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050508;
            color: #b0b0b0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Navigation Bar */
        .top-bar {
            background: #0a0a0f;
            border-bottom: 1px solid #1a1a24;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .logo-small {
            font-size: 2em;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
            letter-spacing: 2px;
        }

        input[type="text"] {
            width: 500px;
            background: rgba(20, 20, 25, 0.8);
            color: #00e5ff;
            border: 1px solid #333;
            padding: 12px 20px;
            font-size: 1.2em;
            font-family: 'Rajdhani', sans-serif;
            border-radius: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* Results Container */
        .results-container {
            max-width: 800px;
            margin: 40px 40px 40px 150px; /* Offset to mimic Google's alignment */
        }

        .loading { color: #00e5ff; font-size: 1.2em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Individual Result Cards */
        .result-card {
            background: #0a0a0f;
            border: 1px solid #1a1a24;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .result-card:hover {
            border-color: #333;
            transform: translateX(5px);
        }

        .url-text {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tag {
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .tag-public { background: #1a1a24; color: #888; border: 1px solid #333; }
        .tag-secure { background: rgba(255, 0, 60, 0.1); color: #ff003c; border: 1px solid #ff003c; box-shadow: 0 0 5px rgba(255, 0, 60, 0.3); }

        .title-link {
            font-size: 1.4em;
            font-weight: 600;
            color: #00e5ff;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        
        .title-link:hover { text-decoration: underline; }
        
        /* Specialized Styling for Lore Results */
        .lore-result { border-left: 3px solid #ff003c; }
        .lore-result .title-link { color: #ff003c; }

        .content-snippet {
            font-size: 1.1em;
            line-height: 1.5;
            color: #a0a0a0;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="/" class="logo-small">AEGIS</a>
        <form action="/search" method="GET">
            <input type="text" name="q" value="{{ q }}" autocomplete="off">
        </form>
    </div>

    <div class="results-container" id="resultsArea">
        <div class="loading">ESTABLISHING UPLINK... SCANNING NETWORKS...</div>
    </div>

    <script>
        // The Jinja2 template injects the query string safely into the JS
        const userQuery = "{{ q }}";

        async function loadResults() {
            const resultsArea = document.getElementById('resultsArea');
            try {
                // Fetch from your Python backend
                const response = await fetch(`/api/search?q=${encodeURIComponent(userQuery)}`);
                const data = await response.json();
                
                resultsArea.innerHTML = ""; 
                
                if (data.results.length === 0) {
                    resultsArea.innerHTML = "<h3 style='color:#ff003c;'>[ERR] NO RECORDS FOUND MATCHING QUERY.</h3>";
                    return;
                }

                // Render each card
                data.results.forEach(item => {
                    const isLore = item.source === 'lore';
                    const cardClass = isLore ? 'result-card lore-result' : 'result-card';
                    const tagHtml = isLore ? '<span class="tag tag-secure">SECURE NODE</span>' : '<span class="tag tag-public">PUBLIC WEB</span>';
                    
                    resultsArea.innerHTML += `
                        <div class="${cardClass}">
                            <div class="url-text">${tagHtml} ${item.url}</div>
                            <a href="${item.url}" target="_blank" class="title-link">${item.title}</a>
                            <p class="content-snippet">${item.content}</p>
                        </div>
                    `;
                });
            } catch (err) {
                resultsArea.innerHTML = `<h3 style="color:#ff003c;">[CRITICAL ERROR] NETWORK CONNECTION SEVERED.</h3>`;
            }
        }
        
        // Execute the search as soon as the DOM loads
        document.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>
