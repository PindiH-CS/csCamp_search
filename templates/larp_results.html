<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELPHI // {{ q }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0e;
            --accent: #5ef3ff;
            --lore-accent: #ff3e60;
            --text-dim: #949499;
            --border: #1e1e21;
        }

        body {
            background-color: var(--bg);
            color: #e2e2e4;
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        .top-bar {
            background: rgba(12, 12, 14, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-small {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            margin-right: 40px;
        }

        input[type="text"] {
            width: 450px;
            background: #161618;
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 8px;
            outline: none;
        }

        .results-container {
            max-width: 1100px; 
            width: 95%;

            margin-left: clamp(20px, 8vw, 120px);
            margin-right: 20px;
            padding: 20px 0;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .results-container {
                margin-left: 15px;
                width: calc(100% - 30px);
            }
            
            .top-bar {
                padding: 15px 20px;
            }

            input[type="text"] {
                width: 100%;
            }
        }

        .status-bar {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .result-card {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-right: 10px;
        }

        .tag-public { color: var(--text-dim); border: 1px solid #333; }
        .tag-secure { color: var(--lore-accent); border: 1px solid var(--lore-accent); }

        .url-text {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
        }

        .title-link {
            font-size: 1.25rem;
            font-weight: 500;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 6px;
        }
        
        .title-link:hover { color: var(--accent); }
        
        /* Lore Styling: Subtle and Clean */
        .lore-result .title-link:hover { color: var(--lore-accent); }

        .content-snippet {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin: 0;
        }

        /* Error messages */
        .error-msg { font-family: 'Rajdhani', sans-serif; color: var(--lore-accent); }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="/" class="logo-small">DELPHI</a>
        <form action="/search" method="GET">
            <input type="text" name="q" value="{{ q }}" autocomplete="off">
        </form>
    </div>

    <div class="results-container">
        <div id="status" class="status-bar">CONNECTING TO NODE... SECURING DATA STREAM...</div>
        <div id="resultsArea"></div>
    </div>

    <script>
        const userQuery = "{{ q }}";

        async function loadResults() {
            const resultsArea = document.getElementById('resultsArea');
            const status = document.getElementById('status');
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(userQuery)}`);
                const data = await response.json();
                
                status.innerText = `FETCHED ${data.results.length} RECORD(S) IN 0.0034s`;
                resultsArea.innerHTML = ""; 
                
                if (data.results.length === 0) {
                    resultsArea.innerHTML = `<h3 class="error-msg">[NULL] NO MATCHING RECORDS IN DATABASE.</h3>`;
                    return;
                }

                data.results.forEach(item => {
                    const isLore = item.source === 'lore';
                    const tagHtml = isLore ? 
                        `<span class="tag tag-secure">Classified</span>` : 
                        `<span class="tag tag-public">Public</span>`;
                    
                    resultsArea.innerHTML += `
                        <div class="result-card ${isLore ? 'lore-result' : ''}">
                            <div class="url-text">${tagHtml} ${item.url}</div>
                            <a href="${item.url}" target="_blank" class="title-link">${item.title}</a>
                            <p class="content-snippet">${item.content}</p>
                        </div>
                    `;
                });
            } catch (err) {
                status.innerText = "CONNECTION FAILURE";
                resultsArea.innerHTML = `<h3 class="error-msg">[CRITICAL] NODE OFFLINE.</h3>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>
