<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DELPHI Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0e;
            --accent: #5ef3ff;
            --text-main: #e2e2e4;
            --border: #232326;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            /* 1. Switch from center to flex-start */
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            /* 2. Responsive Padding: Top scales with height, Left scales with width */
            padding-top: clamp(60px, 15vh, 200px);
            padding-left: clamp(20px, 10vw, 150px);
            padding-right: 20px;
            box-sizing: border-box;

            background-image: radial-gradient(circle at 2px 2px, #1a1a1c 1px, transparent 0);
            background-size: 32px 32px;
            overflow-x: hidden;
        }

        .logo-container {
            /* 3. Align text to the left to match the grid */
            text-align: left;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            /* 4. Fluid typography: scales between 2.5rem and 5rem */
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            letter-spacing: 0.5rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-top: 0.5rem;
        }

        .search-container {
            width: 100%;
            /* 5. Much wider max-width for that "not narrow" feel */
            max-width: 900px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid var(--border);
            padding: clamp(12px, 2vw, 20px) 28px;
            font-size: 1.1rem;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(94, 243, 255, 0.1);
        }

        .footer-note {
            /* 6. Fix footer to bottom-left instead of absolute center */
            margin-top: auto;
            padding-top: 40px;
            padding-bottom: 30px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }

        /* 7. Mobile adjustments */
        @media (max-width: 600px) {
            body {
                padding-top: 20vh;
                padding-left: 25px;
            }
            h1 {
                letter-spacing: 0.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>DELPHI</h1>
        <div class="subtitle">Search Protocol v4.0</div>
    </div>
    
    <div class="search-container">
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Request data access..." autocomplete="off" autofocus>
        </form>
    </div>

    <div class="footer-note">AUTHORIZED PERSONNEL ONLY // SYSTEMS ACTIVE</div>
</body>
</html>
