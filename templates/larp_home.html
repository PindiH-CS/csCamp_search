<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS Network</title> <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050508;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* The futuristic background grid effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            z-index: -1;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 5em;
            margin: 0;
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5), 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .subtitle {
            color: #00e5ff;
            font-size: 1.2em;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .search-container {
            position: relative;
            width: 600px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(10, 10, 15, 0.8);
            color: #00e5ff;
            border: 1px solid #333;
            padding: 18px 25px;
            font-size: 1.5em;
            font-family: 'Rajdhani', sans-serif;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        input[type="text"]:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.1);
        }

        input::placeholder {
            color: #444;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <h1>AEGIS</h1>
        <div class="subtitle">Global Search Node</div>
    </div>
    
    <div class="search-container">
        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Enter query parameters..." autocomplete="off" autofocus>
        </form>
    </div>
</body>
</html>
